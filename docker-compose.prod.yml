services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: smriti
      POSTGRES_USER: smriti
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smriti"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Tune PostgreSQL for 8GB RAM VPS
    command: >
      postgres
        -c shared_buffers=2GB
        -c effective_cache_size=4GB
        -c work_mem=64MB
        -c maintenance_work_mem=512MB
        -c max_connections=100
        -c wal_buffers=64MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
    deploy:
      resources:
        limits:
          memory: 3G

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./backend/.env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://smriti:${POSTGRES_PASSWORD}@postgres:5432/smriti
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      VECTOR_PROVIDER: pgvector
      GRAPH_PROVIDER: postgresql
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["sh", "-c", "cd /app && python -m alembic upgrade head"]
    env_file:
      - ./backend/.env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://smriti:${POSTGRES_PASSWORD}@postgres:5432/smriti
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
    restart: always
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_data:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 64M

  certbot:
    image: certbot/certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot_data:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  redis_data:
  certbot_data:
